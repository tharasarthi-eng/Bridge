<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css"> <!-- Reusing your existing CSS -->
</head>
<body>
    <div class="login-container">
        <form id="signup-form">
            <h2>Create Account</h2>
            <div class="input-group">
                <input type="text" id="new-username" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="new-password" placeholder="Create Password" required>
            </div>
            <button type="submit">Register</button>
            <p class="message">Already have an account? <a href="index.html">Login</a></p>
        </form>
    </div>
    <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const userData = {
        username: document.getElementById('new-username').value,
        password: document.getElementById('new-password').value // Note: Real apps hash this!
    };

    // Replace the URL below with your REAL Render URL
    const response = await fetch('https://your-backend-url.onrender.com/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(userData)
    });

    if (response.ok) {
        alert("Success! You are now in the database.");
        window.location.href = "index.html";
    } else {
        alert("Something went wrong.");
    }
});
    </script>
</body>
</html>
